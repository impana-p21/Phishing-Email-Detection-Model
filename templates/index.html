<!DOCTYPE html>
<html>
<head>
<title>Phishing Email Detection</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Phishing Email Detection</h1>

<form method="POST">

<textarea
name="email"
rows="10"
cols="50"
placeholder="Paste email here"
required></textarea>

<br><br>

<button type="submit">
Detect
</button>

</form>

{% if prediction %}

<h2>{{ prediction }}</h2>

{% endif %}

</div>

</body>
</html>
